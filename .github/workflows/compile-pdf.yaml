name: compile and publish

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  compile:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compile title page
        uses: xu-cheng/latex-action@v4
        with:
          root_file: frontespizio.tex
          working_directory: ./titlepage

      - name: Compile main document
        uses: xu-cheng/latex-action@v4
        with:
          root_file: main.tex
          working_directory: .

      - name: Install pdfunite
        run: sudo apt-get install -y poppler-utils

      - name: Concatenate title page and main document
        run: |
          pdfunite titlepage/frontespizio.pdf main.pdf thesis.pdf

      - name: Prepare artifact directory
        run: |
          mkdir artfact-out
          mv thesis.pdf artfact-out/

      - name: Upload as artifact
        id: deployment
        uses: actions/upload-pages-artifact@v3
        with:
          path: artfact-out

  publish:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: compile
    steps:
      - name: Publish to ghp
        id: deployment
        uses: actions/deploy-pages@v4
